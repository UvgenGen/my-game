version: '3'

services:
  mygame:
    build: ./mygame
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000 --settings='mygame.settings.development'"
    environment:
      DJANGO_SETTINGS_MODULE: mygame.settings.development
    volumes:
      - .:/mygame
    ports:
      - '8000:8000'
    networks:
      default:
        aliases:
          - web-mygame
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - '3306:3306'
    environment:
      MYSQL_DATABASE: 'db_django'
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: 'password'
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u $$MYSQL_USER --password=$$MYSQL_PASSWORD
      timeout: 3s
      retries: 10
    restart: always
    volumes:
      - ./db_django:/var/lib/mysql

  frontend-app-mygame:
    build: ./frontend-app-mygame
    ports:
      - '3000:3000'
    restart: always
    volumes:
      - ./frontend-app-mygame:/app
    networks:
      default:
        aliases:
          - frontend-app-mygame
    depends_on:
      - mygame

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"